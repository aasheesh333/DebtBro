<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Debt Card</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(180deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }
        .card {
            width: 1080px;
            height: 1350px;
            background: linear-gradient(145deg, rgba(30, 30, 50, 0.9), rgba(20, 20, 35, 0.95));
            border-radius: 40px;
            padding: 60px;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .header {
            text-align: center;
            margin-bottom: 50px;
        }
        .header-emoji {
            font-size: 5rem;
            margin-bottom: 20px;
        }
        .header-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 10px;
        }
        .header-subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 0.3em;
        }
        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 50px;
            flex: 1;
            min-width: 0;
            overflow: hidden;
        }
        .quote-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px 50px;
            text-align: center;
            width: 100%;
            max-width: 800px;
            max-height: 150px;
            overflow: hidden;
            position: relative;
            min-width: 0;
            box-sizing: border-box;
        }
        .quote-text {
            font-size: 1.8rem;
            font-weight: 600;
            color: #fff;
            line-height: 1.4;
            white-space: normal;
            word-wrap: break-word;
            overflow-wrap: break-word;
            word-break: break-word;
            max-height: 90px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            width: 100%;
            box-sizing: border-box;
        }
        .parties {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            flex-wrap: wrap;
        }
        .party {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 25px;
            padding: 30px 50px;
            text-align: center;
        }
        .party-label {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 10px;
        }
        .party-name {
            font-size: clamp(1.5rem, 3vw, 2.5rem);
            font-weight: 700;
            color: #fff;
            word-wrap: break-word;
            overflow-wrap: anywhere;
            max-width: 280px;
        }
        .arrow {
            font-size: 2.5rem;
            color: #f97316;
        }
        .amount-box {
            background: linear-gradient(135deg, #f97316, #ea580c);
            border-radius: 30px;
            padding: 50px 80px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(249, 115, 22, 0.3);
        }
        .amount-label {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: rgba(255, 255, 255, 0.9);
        }
        .amount {
            font-size: clamp(3.5rem, 12vw, 9rem);
            font-weight: 800;
            color: #fff;
            line-height: 1;
            word-wrap: break-word;
            overflow-wrap: anywhere;
            max-width: 500px;
        }
        .details {
            display: flex;
            justify-content: center;
            gap: 50px;
            flex-wrap: wrap;
        }
        .detail-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.3rem;
            color: rgba(255, 255, 255, 0.7);
            max-width: 45%;
            overflow-wrap: break-word;
            word-break: break-word;
        }
        .detail-item .text-content {
            font-size: 1.3rem;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.4;
            max-width: 280px;
        }
        .detail-icon {
            font-size: 1.5rem;
            flex-shrink: 0;
        }
        .footer {
            position: absolute;
            bottom: 40px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 1rem;
            letter-spacing: 0.2em;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="header-emoji">&#128179;</div>
            <div class="header-title">Payment Reminder</div>
            <div class="header-subtitle">Settlement Request</div>
        </div>

        <div class="content">
            <div class="quote-box">
                <div class="quote-text">"{{debtQuote}}"</div>
            </div>

            <div class="parties">
                <div class="party">
                    <div class="party-label">Lender</div>
                    <div class="party-name">{{lenderName}}</div>
                </div>
                <div class="arrow">&#10140;</div>
                <div class="party">
                    <div class="party-label">Borrower</div>
                    <div class="party-name">{{borrowerName}}</div>
                </div>
            </div>

            <div class="amount-box">
                <div class="amount-label">Amount Owed</div>
                <div class="amount">{{currency}}{{amount}}</div>
            </div>

            <div class="details">
                <div class="detail-item">
                    <span class="detail-icon">&#128197;</span>
                    <span class="text-content">{{dueDate}}</span>
                </div>
                <div class="detail-item" style="display: {{descriptionDisplay}}">
                    <span class="detail-icon">&#128221;</span>
                    <span class="text-content">{{description}}</span>
                </div>
            </div>
        </div>

        <div class="footer">
            Made with 💚
        </div>
    </div>
</body>
</html>
