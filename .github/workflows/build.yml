name: DebtBro CI/CD

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Build Signed Release Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/keystore.jks
      - name: Create google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json
      - name: Validate google-services.json
        run: |
          jq empty app/google-services.json || (echo "Invalid google-services.json" && exit 1)
          grep -q '"package_name": "com.dhanuk.debtbro"' app/google-services.json || (echo "Wrong package name in google-services.json" && exit 1)
      - name: Create local.properties
        run: |
          cat > local.properties << EOF
          sdk.dir=$ANDROID_SDK_ROOT
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          ADMOB_APP_ID=${{ secrets.ADMOB_APP_ID }}
          ADMOB_BANNER_ID=${{ secrets.ADMOB_BANNER_ID }}
          ADMOB_INTERSTITIAL_ID=${{ secrets.ADMOB_INTERSTITIAL_ID }}
          ADMOB_REWARDED_ID=${{ secrets.ADMOB_REWARDED_ID }}
          ONESIGNAL_APP_ID=${{ secrets.ONESIGNAL_APP_ID }}
          PACKAGE_NAME=${{ secrets.PACKAGE_NAME }}
          KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
          FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
          ACCOUNT_DELETION_URL=${{ secrets.ACCOUNT_DELETION_URL }}
          EOF
      - name: Echo version info
        run: |
          echo "Build #${{ github.run_number }}"
          echo "SHA: ${{ github.sha }}"
          echo "Ref: ${{ github.ref }}"
      - name: Grant Gradle permission
        run: chmod +x gradlew
      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace
      - name: Build Release AAB
        run: ./gradlew bundleRelease --stacktrace
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DebtBro-APK-${{ github.run_number }}
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: DebtBro-AAB-${{ github.run_number }}
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "DebtBro v1.0.${{ github.run_number }}"
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
