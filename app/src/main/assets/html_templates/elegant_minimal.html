<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elegant Minimalist</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Georgia', 'Times New Roman', serif; background-color: #fefefe; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .elegant-post { width: 1080px; height: 1350px; background: #fff; color: #1a1a1a; padding: 100px; border: 2px solid #e5e5e5; position: relative; }
        .text-center { text-align: center; }
        .mb-32 { margin-bottom: 8rem; }
        .mb-24 { margin-bottom: 6rem; }
        .mb-20 { margin-bottom: 5rem; }
        .mb-4 { margin-bottom: 1rem; }
        .mb-2 { margin-bottom: 0.5rem; }
        .text-sm { font-size: 0.875rem; }
        .text-2xl { font-size: 1.5rem; }
        .text-xl { font-size: 1.25rem; }
        .text-4xl { font-size: 2.25rem; }
        .text-6xl { font-size: 4rem; }
        .text-7xl { font-size: 5rem; }
        .text-9xl { font-size: 8rem; }
        .font-semibold { font-weight: 600; }
        .font-bold { font-weight: bold; }
        .italic { font-style: italic; }
        .uppercase { text-transform: uppercase; }
        .tracking-\[0\.5em\] { letter-spacing: 0.5em; }
        .tracking-widest { letter-spacing: 0.2em; }
        .tracking-\[1em\] { letter-spacing: 1em; }
        .text-gray-400 { color: #9ca3af; }
        .text-gray-500 { color: #6b7280; }
        .text-gray-600 { color: #4b5563; }
        .text-gray-300 { color: #d1d5db; }
        .flex { display: flex; }
        .justify-center { justify-content: center; }
        .items-center { align-items: center; }
        .h-px { height: 1px; }
        .bg-gray-200 { background-color: #e5e7eb; }
        .flex-grow { flex-grow: 1; }
        .mx-10 { margin-left: 2.5rem; margin-right: 2.5rem; }
        .my-20 { margin-top: 5rem; margin-bottom: 5rem; }
        .max-w-2xl { max-width: 672px; }
        .mx-auto { margin-left: auto; margin-right: auto; }
        .leading-relaxed { line-height: 1.625; }
        .absolute { position: absolute; }
        .bottom-20 { bottom: 5rem; }
        .left-0 { left: 0; }
        .right-0 { right: 0; }
    </style>
</head>
<body>
    <div class="elegant-post">
        <div class="text-center mb-32">
            <p class="text-sm uppercase tracking-[0.5em] text-gray-400 mb-4">Settlement Request</p>
            <h1 class="text-7xl italic">Gentle Reminder</h1>
        </div>

        <div class="text-center mb-32">
            <p class="text-2xl text-gray-500 mb-2">From {{lenderName}} to</p>
            <p class="text-6xl font-semibold">{{borrowerName}}</p>
        </div>

        <div class="flex justify-center items-center my-20">
            <div class="h-px bg-gray-200 flex-grow"></div>
            <div class="mx-10 text-center">
                <p class="text-gray-400 text-xl uppercase tracking-widest mb-2">Balance Due</p>
                <p class="text-9xl font-bold">{{currency}}{{amount}}</p>
            </div>
            <div class="h-px bg-gray-200 flex-grow"></div>
        </div>

        <div class="text-center max-w-2xl mx-auto">
            <p class="text-4xl text-gray-600 italic leading-relaxed">
                "A small reminder for the {{description}} on {{dueDate}}. Your prompt settlement would be greatly appreciated."
            </p>
        </div>

        <div class="absolute bottom-20 left-0 right-0 text-center">
            <p class="text-gray-300 tracking-[1em] uppercase text-sm">DebtBro Luxury</p>
        </div>
    </div>
</body>
</html>
