<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insta-Vibe Debt Share</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Caveat:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #1a1a1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .insta-post { width: 1080px; height: 1350px; background: linear-gradient(45deg, #0f172a, #1e293b); position: relative; overflow: hidden; color: white; padding: 80px; box-sizing: border-box; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 40px; }
        .quote-font { font-family: 'Caveat', cursive; }
        .accent-glow { position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, rgba(56, 189, 248, 0.15) 0%, transparent 70%); z-index: 0; }
    </style>
</head>
<body>
    <div class="insta-post">
        <div class="accent-glow" style="top: -100px; right: -100px;"></div>
        <div class="accent-glow" style="bottom: -100px; left: -100px;"></div>

        <div class="relative z-10 h-full flex flex-col justify-between">
            <!-- Top Section: Quote & Emoji -->
            <div class="text-center mt-20">
                <div class="text-8xl mb-6">💸</div>
                <h1 class="quote-font text-6xl text-sky-400 leading-tight italic">
                    "{{debtQuote}}"
                </h1>
            </div>

            <!-- Center Section: Debt Details -->
            <div class="glass p-12 text-center mx-auto w-full max-w-3xl shadow-2xl">
                <div class="flex justify-center items-center gap-8 mb-8">
                    <div class="text-center">
                        <p class="text-gray-400 uppercase tracking-widest text-xl">Lender</p>
                        <p class="text-4xl font-bold">{{lenderName}}</p>
                    </div>
                    <div class="text-6xl text-sky-500 font-black">➔</div>
                    <div class="text-center">
                        <p class="text-gray-400 uppercase tracking-widest text-xl">Borrower</p>
                        <p class="text-4xl font-bold">{{borrowerName}}</p>
                    </div>
                </div>

                <div class="text-center mb-8">
                    <p class="text-gray-400 text-2xl mb-2">Amount Owed</p>
                    <p class="text-9xl font-black text-white tracking-tighter">{{currency}}{{amount}}</p>
                </div>

                <div class="flex justify-center gap-12 text-2xl text-gray-300 border-t border-white/10 pt-8">
                    <div class="flex items-center gap-3">
                        <span>📅</span> <span>{{dueDate}}</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <span>📝</span> <span>"{{description}}"</span>
                    </div>
                </div>
            </div>

            <!-- Bottom Section: Brand -->
            <div class="text-center mb-10">
                <p class="text-gray-500 text-2xl tracking-widest uppercase">Generated by DebtBro</p>
            </div>
        </div>
    </div>
</body>
</html>
