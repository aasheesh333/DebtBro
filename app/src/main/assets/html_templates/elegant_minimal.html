<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Debt Card</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }
        .card {
            width: 1080px;
            height: 1350px;
            background: #ffffff;
            border-radius: 8px;
            padding: 80px 60px;
            position: relative;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }
        .header {
            text-align: center;
            margin-bottom: 60px;
            padding-bottom: 40px;
            border-bottom: 1px solid #e5e5e5;
        }
        .brand {
            font-size: 1.5rem;
            font-weight: 600;
            color: #333;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-bottom: 15px;
        }
        .title {
            font-size: 2rem;
            font-weight: 300;
            color: #666;
            letter-spacing: 0.1em;
        }
        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 50px;
            max-width: 700px;
            flex: 1;
            min-width: 0;
            overflow: hidden;
            margin: 0 auto;
        }
        .parties {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 50px;
            flex-wrap: wrap;
            width: 100%;
        }
        .party {
            flex: 1;
            min-width: 200px;
            text-align: center;
        }
        .party-label {
            font-size: 0.9rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 12px;
        }
        .party-name {
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            font-weight: 500;
            color: #1a1a1a;
            word-wrap: break-word;
            overflow-wrap: anywhere;
        }
        .arrow {
            font-size: 2rem;
            color: #ccc;
        }
        .divider {
            width: 100px;
            height: 1px;
            background: #e5e5e5;
        }
        .amount-section {
            text-align: center;
            padding: 40px 0;
        }
        .amount-label {
            font-size: 0.9rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 15px;
        }
        .amount {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 700;
            color: #1a1a1a;
            word-wrap: break-word;
            overflow-wrap: anywhere;
            max-width: 500px;
        }
        .note {
            background: #fafafa;
            border-left: 3px solid #333;
            padding: 25px 35px;
            width: 100%;
            max-width: 600px;
            max-height: 120px;
            text-align: center;
            overflow: hidden;
            position: relative;
            min-width: 0;
            box-sizing: border-box;
        }
        .note-content {
            font-size: 1.2rem;
            color: #555;
            line-height: 1.6;
            white-space: normal;
            word-wrap: break-word;
            overflow-wrap: break-word;
            word-break: break-word;
            max-height: 80px;
            overflow: hidden;
            display: block;
            width: 100%;
            box-sizing: border-box;
        }
        .note-label {
            font-size: 0.8rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 10px;
        }
        .note-content {
            font-size: 1.2rem;
            color: #555;
            line-height: 1.6;
            word-wrap: break-word;
            overflow-wrap: anywhere;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .details {
            display: flex;
            justify-content: center;
            gap: 60px;
            flex-wrap: wrap;
        }
        .detail-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.1rem;
            color: #777;
            max-width: 45%;
            overflow-wrap: break-word;
            word-break: break-word;
        }
        .detail-item .text-content {
            font-size: 1.1rem;
            color: #777;
            line-height: 1.4;
            max-width: 280px;
        }
        .detail-icon {
            font-size: 1.3rem;
            flex-shrink: 0;
        }
        .footer {
            position: absolute;
            bottom: 40px;
            left: 0;
            right: 0;
            text-align: center;
            color: #ccc;
            font-size: 0.85rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="brand">📋</div>
            <div class="title">Settlement Request</div>
        </div>

        <div class="content">
            <div class="parties">
                <div class="party">
                    <div class="party-label">From</div>
                    <div class="party-name">{{lenderName}}</div>
                </div>
                <div class="arrow">&#10140;</div>
                <div class="party">
                    <div class="party-label">To</div>
                    <div class="party-name">{{borrowerName}}</div>
                </div>
            </div>

            <div class="divider"></div>

            <div class="amount-section">
                <div class="amount-label">Balance Due</div>
                <div class="amount">{{currency}}{{amount}}</div>
            </div>

            <div class="note">
                <div class="note-label">Note</div>
                <div class="note-content">{{description}}{{dueDateText}} {{dueDate}}{{quoteText}} {{debtQuote}}</div>
            </div>

            <div class="details">
                <div class="detail-item">
                    <span class="detail-icon">&#128197;</span>
                    <span class="text-content">{{dueDate}}</span>
                </div>
                <div class="detail-item" style="display: {{descriptionDisplay}}">
                    <span class="detail-icon">&#128221;</span>
                    <span class="text-content">{{description}}</span>
                </div>
            </div>
        </div>

        <div class="footer">
            Made with 💚
        </div>
    </div>
</body>
</html>
