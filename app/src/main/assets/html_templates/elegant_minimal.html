<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elegant Minimalist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fefefe; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .elegant-post { width: 1080px; height: 1350px; background: #fff; color: #1a1a1a; padding: 100px; box-sizing: border-box; border: 2px solid #e5e5e5; }
        .serif { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body>
    <div class="elegant-post">
        <div class="text-center mb-32">
            <p class="text-sm uppercase tracking-[0.5em] text-gray-400 mb-4">Settlement Request</p>
            <h1 class="serif text-7xl italic">Gentle Reminder</h1>
        </div>

        <div class="text-center mb-32">
            <p class="text-2xl text-gray-500 mb-2">From {{lenderName}} to</p>
            <p class="text-6xl font-semibold">{{borrowerName}}</p>
        </div>

        <div class="flex justify-center items-center my-20">
            <div class="h-px bg-gray-200 flex-grow"></div>
            <div class="mx-10 text-center">
                <p class="text-gray-400 text-xl uppercase tracking-widest mb-2">Balance Due</p>
                <p class="serif text-9xl font-bold">{{currency}}{{amount}}</p>
            </div>
            <div class="h-px bg-gray-200 flex-grow"></div>
        </div>

        <div class="text-center max-w-2xl mx-auto">
            <p class="serif text-4xl text-gray-600 italic leading-relaxed">
                "A small reminder for the {{description}} on {{dueDate}}. Your prompt settlement would be greatly appreciated."
            </p>
        </div>

        <div class="absolute bottom-20 left-0 right-0 text-center">
            <p class="text-gray-300 tracking-[1em] uppercase text-sm">DebtBro Luxury</p>
        </div>
    </div>
</body>
</html>
