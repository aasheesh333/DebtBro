name: DebtBro CI/CD — Build Signed APK

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    name: Build Signed Release APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 🔍 Verify Secrets Loaded
        run: |
          echo "ADMOB loaded: $([ -n '${{ secrets.ADMOB_APP_ID }}' ] && echo YES || echo MISSING)"
          echo "GROQ loaded: $([ -n '${{ secrets.GROQ_API_KEY }}' ] && echo YES || echo MISSING)"

      - name: 🔑 Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/keystore.jks

      - name: 📝 Create local.properties
        run: |
          cat > local.properties << EOF
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          ADMOB_APP_ID=${{ secrets.ADMOB_APP_ID }}
          ADMOB_BANNER_ID=${{ secrets.ADMOB_BANNER_ID }}
          ADMOB_INTERSTITIAL_ID=${{ secrets.ADMOB_INTERSTITIAL_ID }}
          ADMOB_REWARDED_ID=${{ secrets.ADMOB_REWARDED_ID }}
          ONESIGNAL_APP_ID=${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_API_KEY=${{ secrets.ONESIGNAL_API_KEY }}
          PACKAGE_NAME=${{ secrets.PACKAGE_NAME }}
          KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
          sdk.dir=$ANDROID_SDK_ROOT
          EOF

      - name: 📦 Create google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: 🛠️ Grant Gradle execute permission
        run: chmod +x gradlew

      - name: 🏗️ Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DebtBro-Release-APK-${{ github.sha }}
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: 🏷️ Create Release Tag (main branch only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "DebtBro v1.0.${{ github.run_number }}"
          body: "🚀 Auto-build from commit ${{ github.sha }}"
          files: app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
