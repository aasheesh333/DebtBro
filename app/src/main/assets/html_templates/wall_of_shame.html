<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Debt Card</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f97316 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }
        .card {
            width: 1080px;
            height: 1350px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 40px;
            padding: 60px;
            position: relative;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .header {
            text-align: center;
            margin-bottom: 50px;
        }
        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 0.3em;
        }
        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            flex: 1;
            min-width: 0;
            overflow: hidden;
        }
        .parties {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 800px;
            gap: 30px;
            min-width: 0;
        }
        .party {
            flex: 1;
            min-width: 0;
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            border-radius: 20px;
        }
        .party-label {
            font-size: 1rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 10px;
        }
        .party-name {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 700;
            color: #1a1a1a;
            word-wrap: break-word;
            overflow-wrap: anywhere;
            max-width: 300px;
        }
        .arrow {
            font-size: 3rem;
            color: #764ba2;
        }
        .amount-box {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 50px 80px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
        }
        .amount-label {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }
        .amount {
            font-size: clamp(3rem, 10vw, 8rem);
            font-weight: 800;
            line-height: 1;
            word-wrap: break-word;
            overflow-wrap: anywhere;
            max-width: 600px;
        }
        .details {
            display: flex;
            justify-content: center;
            gap: 60px;
            flex-wrap: wrap;
        }
        .detail-item {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.4rem;
            color: #555;
            max-width: 45%;
            overflow-wrap: break-word;
            word-break: break-word;
        }
        .detail-item .text-content {
            font-size: 1.4rem;
            color: #555;
            line-height: 1.4;
            max-width: 320px;
        }
        .detail-icon {
            font-size: 1.8rem;
            flex-shrink: 0;
        }
        .quote {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            padding: 30px 50px;
            border-radius: 20px;
            text-align: center;
            width: 100%;
            max-width: 700px;
            max-height: 130px;
            overflow: hidden;
            position: relative;
            min-width: 0;
            box-sizing: border-box;
        }
        .quote-text {
            font-size: 1.5rem;
            font-style: italic;
            color: #555;
            line-height: 1.4;
            white-space: normal;
            word-wrap: break-word;
            overflow-wrap: break-word;
            word-break: break-word;
            max-height: 80px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            width: 100%;
            box-sizing: border-box;
        }
        .footer {
            position: absolute;
            bottom: 40px;
            left: 0;
            right: 0;
            text-align: center;
            color: #999;
            font-size: 1rem;
            letter-spacing: 0.2em;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="logo">💸 Payment Reminder</div>
            <div class="subtitle">Settlement Request</div>
        </div>

        <div class="content">
            <div class="parties">
                <div class="party">
                    <div class="party-label">From</div>
                    <div class="party-name">{{lenderName}}</div>
                </div>
                <div class="arrow">&#10140;</div>
                <div class="party">
                    <div class="party-label">To</div>
                    <div class="party-name">{{borrowerName}}</div>
                </div>
            </div>

            <div class="amount-box">
                <div class="amount-label">Amount Due</div>
                <div class="amount">{{currency}}{{amount}}</div>
            </div>

            <div class="details">
                <div class="detail-item">
                    <span class="detail-icon">&#128197;</span>
                    <span class="text-content">{{dueDate}}</span>
                </div>
                <div class="detail-item" style="display: {{descriptionDisplay}}">
                    <span class="detail-icon">&#128221;</span>
                    <span class="text-content">{{description}}</span>
                </div>
            </div>

            <div class="quote">
                <div class="quote-text">"{{debtQuote}}"</div>
            </div>
        </div>

        <div class="footer">
            Made with 💚
        </div>
    </div>
</body>
</html>
