name: PR Validation (no secrets)

# ─────────────────────────────────────────────────────────────────────────────
# Runs on every PR + every push to non-main feature branches.
# Compiles the Kotlin sources, builds the debug APK, runs lint, and uploads
# the artifacts — **without any prod secrets**.
#
# This means fork contributors and reviewers without repo access get fast
# typecheck feedback in ~6 minutes rather than timing out at the keystore
# decoding step. The signed release build still lives in
# `.github/workflows/build.yml` and is gated to main + `v*` tags.
# ─────────────────────────────────────────────────────────────────────────────

on:
  pull_request:
    branches: ["**"]
  push:
    branches-ignore: ["main"]
  workflow_dispatch:

concurrency:
  group: pr-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Compile + Lint Debug
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK (API 35, build-tools 35.0.0)
        uses: android-actions/setup-android@v3
        with:
          api-level: 35
          build-tools-version: 35.0.0

      # Google's plugins (Firebase, Crashlytics, Performance) require
      # google-services.json at *config* time. We write a stub that satisfies
      # the well-known package_name check but contains no real API keys.
      # This is fine because assembleDebug is unsigned + non-prod.
      - name: Stub google-services.json
        run: |
          cat > app/google-services.json << 'STUB_JSON'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "ci-stub"
            },
            "client": [{
              "client_info": {
                "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                "android_client_info": { "package_name": "com.dhanuk.debtbro" }
              },
              "oauth_client": [],
              "api_key": [{ "current_key": "AIzaSyCI-stub-not-real" }],
              "services": {
                "appinvite_service": { "other_platform_oauth_client": [] }
              }
            }],
            "configuration_version": "1"
          }
          STUB_JSON

      # Minimal local.properties — only sdk.dir is required. All BuildConfig
      # strings fall through to empty values (Kotlin accepts empty String
      # constants just fine). The ADMOB_APP_ID manifest placeholder uses the
      # AdMob test ID under the existing gradle gate, so no hard error.
      - name: Write local.properties
        run: |
          cat > local.properties << 'PROPS'
          sdk.dir=$ANDROID_HOME
          PROPS

      - name: Grant Gradle permission
        run: chmod +x gradlew

      # Full debug build catches more than just `:app:compileDebugKotlin`:
      # exercises Hilt + Room KSP, resource processing, manifest merging,
      # and AGP configuration. Costs ~1-2 minutes extra vs a pure typecheck.
      #
      # `:app:clean` BEFORE `:app:assembleDebug` forces a fresh `app/build/`
      # wipe every run — defends against stale Kotlin incremental-compilation
      # metadata that can reference source files deleted in a previous
      # branch state but still lingering in the build directory. Without the
      # clean step, a classpath with a phantom-symbol error like
      # `Unresolved reference: Foo in Bar.kt` can surface even when Bar.kt
      # is no longer in the repo.
      #
      # `--rerun-tasks` further defeats Gradle's build cache (the
      # `~/.gradle/caches/build-cache-1/` layer preserved by the
      # `setup-java cache: gradle` step) so no task can be served from a
      # cached output of a previous branch state. Cost: ~1 minute extra
      # vs incremental, acceptable for fast PR feedback.
      - name: Assemble Debug APK
        run: ./gradlew :app:clean :app:assembleDebug --rerun-tasks --no-daemon --stacktrace --warning-mode=summary

      - name: Lint Debug
        id: lint
        run: ./gradlew :app:lintDebug --no-daemon
        continue-on-error: true

      - name: Upload lint report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report-debug-${{ github.run_number }}
          path: app/build/reports/lint-results-debug.html
          retention-days: 14

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: DebtBro-debug-APK-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
