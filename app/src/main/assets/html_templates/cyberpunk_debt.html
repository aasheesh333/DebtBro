<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Debt Card</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }
        .card {
            width: 1080px;
            height: 1350px;
            background: linear-gradient(145deg, #1e1e32, #15152a);
            border-radius: 30px;
            padding: 60px;
            position: relative;
            border: 1px solid rgba(201, 169, 106, 0.2);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .header {
            text-align: center;
            margin-bottom: 50px;
            padding-bottom: 30px;
            border-bottom: 1px solid rgba(201, 169, 106, 0.2);
        }
        .brand {
            font-size: 1.8rem;
            font-weight: 700;
            color: #c9a96a;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-bottom: 15px;
        }
        .title {
            font-size: 1.8rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 0.15em;
        }
        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 45px;
            flex: 1;
            min-width: 0;
            overflow: hidden;
        }
        .parties {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            flex-wrap: wrap;
            width: 100%;
            min-width: 0;
        }
        .party {
            flex: 1;
            min-width: 0;
            min-width: 220px;
            background: rgba(201, 169, 106, 0.08);
            border: 1px solid rgba(201, 169, 106, 0.2);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
        }
        .party-label {
            font-size: 0.9rem;
            color: rgba(201, 169, 106, 0.7);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 12px;
        }
        .party-name {
            font-size: clamp(1.6rem, 3.5vw, 2.4rem);
            font-weight: 600;
            color: #fff;
            word-wrap: break-word;
            overflow-wrap: anywhere;
        }
        .arrow {
            font-size: 2rem;
            color: #c9a96a;
        }
        .amount-box {
            background: linear-gradient(135deg, #c9a96a, #a8864a);
            border-radius: 25px;
            padding: 50px 70px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(201, 169, 106, 0.25);
        }
        .amount-label {
            font-size: 1rem;
            opacity: 0.9;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: rgba(255, 255, 255, 0.9);
        }
        .amount {
            font-size: clamp(3rem, 10vw, 7rem);
            font-weight: 800;
            color: #fff;
            line-height: 1;
            word-wrap: break-word;
            overflow-wrap: anywhere;
            max-width: 500px;
        }
        .details-row {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }
        .detail-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.6);
            max-width: 45%;
            overflow-wrap: break-word;
            word-break: break-word;
        }
        .detail-item .text-content {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.4;
            max-width: 260px;
        }
        .detail-icon {
            font-size: 1.4rem;
            flex-shrink: 0;
        }
        .quote-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(201, 169, 106, 0.15);
            border-radius: 20px;
            padding: 30px 45px;
            text-align: center;
            width: 100%;
            max-width: 700px;
            max-height: 150px;
            overflow: hidden;
            position: relative;
            min-width: 0;
            box-sizing: border-box;
        }
        .quote-text {
            font-size: 1.4rem;
            color: rgba(255, 255, 255, 0.7);
            font-style: italic;
            line-height: 1.5;
            white-space: normal;
            word-wrap: break-word;
            overflow-wrap: break-word;
            word-break: break-word;
            max-height: 90px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            width: 100%;
            box-sizing: border-box;
        }
        .footer {
            position: absolute;
            bottom: 40px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.9rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="brand">📋</div>
            <div class="title">Payment Due</div>
        </div>

        <div class="content">
            <div class="parties">
                <div class="party">
                    <div class="party-label">From</div>
                    <div class="party-name">{{lenderName}}</div>
                </div>
                <div class="arrow">&#10140;</div>
                <div class="party">
                    <div class="party-label">To</div>
                    <div class="party-name">{{borrowerName}}</div>
                </div>
            </div>

            <div class="amount-box">
                <div class="amount-label">Amount Due</div>
                <div class="amount">{{currency}}{{amount}}</div>
            </div>

            <div class="details-row">
                <div class="detail-item">
                    <span class="detail-icon">&#128197;</span>
                    <span class="text-content">{{dueDate}}</span>
                </div>
                <div class="detail-item" style="display: {{descriptionDisplay}}">
                    <span class="detail-icon">&#128221;</span>
                    <span class="text-content">{{description}}</span>
                </div>
            </div>

            <div class="quote-box">
                <div class="quote-text">"{{debtQuote}}"</div>
            </div>
        </div>

        <div class="footer">
            Made with 💚
        </div>
    </div>
</body>
</html>
