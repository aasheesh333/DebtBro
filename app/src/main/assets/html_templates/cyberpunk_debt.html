<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width-width, initial-scale=1.0">
    <title>Cyberpunk Debt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'JetBrains Mono', monospace; background-color: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .cyber-post { width: 1080px; height: 1350px; background: #000; color: #0ff; padding: 60px; box-sizing: border-box; border: 10px solid #0ff; position: relative; box-shadow: inset 0 0 50px #0ff, 0 0 50px #0ff; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .glitch { position: relative; color: #0ff; }
        .glitch::after { content: attr(data-text); position: absolute; left: 2px; text-shadow: -2px 0 #f0f; top: 0; color: #0ff; background: black; overflow: hidden; clip: rect(0px, 900px, 0px, 0px); animation: noise-anim 2s infinite linear alternate-reverse; }
        @keyframes noise-anim { 0% { clip: rect(10px, 9999px, 20px, 0); } 100% { clip: rect(80px, 9999px, 90px, 0); } }
    </style>
</head>
<body>
    <div class="cyber-post">
        <div class="orbitron text-center mb-20">
            <h1 class="text-7xl font-black glitch" data-text="DEBT DETECTED">DEBT DETECTED</h1>
            <p class="text-xl mt-4 tracking-widest opacity-70">SYSTEM ALERT // 0x444_DEBT</p>
        </div>

        <div class="border-2 border-cyan-400 p-10 relative">
            <div class="absolute -top-4 left-10 bg-black px-4 text-cyan-400 font-bold uppercase">Identity Verified</div>
            <div class="flex justify-between items-center mb-12">
                <div>
                    <p class="text-xs uppercase opacity-50">Lender</p>
                    <p class="text-4xl font-bold">{{lenderName}}</p>
                </div>
                <div class="text-5xl">⚡</div>
                <div class="text-right">
                    <p class="text-xs uppercase opacity-50">Debtor</p>
                    <p class="text-4xl font-bold">{{borrowerName}}</p>
                </div>
            </div>

            <div class="text-center py-10">
                <p class="text-sm uppercase opacity-50 mb-2">Outstanding Balance</p>
                <p class="orbitron text-9xl font-black text-white">{{currency}}{{amount}}</p>
            </div>

            <div class="bg-cyan-900/30 p-6 border-l-4 border-cyan-400 mt-10">
                <p class="text-xl italic">"{{description}} - {{dueDate}}"</p>
                <p class="text-sm mt-2 opacity-70">Status: OVERDUE // Action: PAY_NOW</p>
            </div>
        </div>

        <div class="absolute bottom-20 left-0 right-0 text-center">
            <div class="orbitron text-3xl font-bold animate-pulse">DEBTBRO_OS v2.0</div>
        </div>
    </div>
</body>
</html>
