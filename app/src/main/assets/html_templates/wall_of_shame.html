<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Wall of Shame</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background-color: #111; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .shame-post { width: 1080px; height: 1350px; background: #ffde03; color: #000; padding: 60px; position: relative; border: 30px solid #000; }
        .text-center { text-align: center; }
        .mb-16 { margin-bottom: 4rem; }
        .mb-8 { margin-bottom: 2rem; }
        .mb-10 { margin-bottom: 2.5rem; }
        .mb-4 { margin-bottom: 1rem; }
        .mb-6 { margin-bottom: 1.5rem; }
        .uppercase { text-transform: uppercase; }
        .flex { display: flex; }
        .justify-center { justify-content: center; }
        .items-center { align-items: center; }
        .flex-col { flex-direction: column; }
        .gap-20 { gap: 5rem; }
        .sticker { background: #000; color: #ffde03; padding: 10px 30px; transform: rotate(-5deg); display: inline-block; font-weight: bold; font-size: 3rem; font-family: 'Impact', sans-serif; }
        .bungee { font-family: 'Impact', 'Arial Black', sans-serif; }
        .text-5xl { font-size: 3rem; }
        .text-8xl { font-size: 6rem; }
        .text-4xl { font-size: 2.25rem; }
        .text-3xl { font-size: 2rem; }
        .text-2xl { font-size: 1.5rem; }
        .text-sm { font-size: 0.875rem; }
        .text-\[12rem\] { font-size: 12rem; }
        .font-black { font-weight: 900; }
        .font-medium { font-weight: 500; }
        .font-bold { font-weight: bold; }
        .leading-none { line-height: 1; }
        .italic { font-style: italic; }
        .opacity-50 { opacity: 0.5; }
        .bg-white { background-color: #fff; }
        .border-8 { border-width: 8px; border-style: solid; }
        .border-black { border-color: #000; }
        .p-12 { padding: 3rem; }
        .shadow-\[20px_20px_0px_0px_rgba\(0\,0\,0\,1\)\] { box-shadow: 20px 20px 0px 0px rgba(0,0,0,1); }
        .absolute { position: absolute; }
        .bottom-20 { bottom: 5rem; }
        .left-0 { left: 0; }
        .right-0 { right: 0; }
        .h-3\/5 { height: 60%; }
    </style>
</head>
<body>
    <div class="shame-post">
        <div class="text-center mb-16">
            <div class="sticker bungee text-5xl mb-8">WANTED FOR DEBT</div>
            <h1 class="bungee text-8xl uppercase">{{borrowerName}}</h1>
        </div>

        <div class="flex flex-col items-center justify-center text-center h-3/5">
            <div class="bg-white border-8 border-black p-12" style="box-shadow: 20px 20px 0px 0px rgba(0,0,0,1);">
                <p class="text-4xl font-bold mb-4">You borrowed from {{lenderName}}</p>
                <p class="text-[12rem] font-black leading-none mb-6">{{currency}}{{amount}}</p>
                <p class="text-3xl font-medium italic">"{{debtQuote}}"</p>
            </div>
        </div>

        <div class="absolute bottom-20 left-0 right-0 text-center">
            <div class="flex justify-center gap-20 text-4xl font-black uppercase mb-10">
                <div>&#x1F4C5; {{dueDate}}</div>
                <div>&#x1F355; {{description}}</div>
            </div>
            <p class="bungee text-3xl opacity-50">DebtBro official record</p>
        </div>
    </div>
</body>
</html>
