name: DebtBro Release Build

# ─────────────────────────────────────────────────────────────────────────────
# Builds the signed release APK + AAB on every push to main, on `v*` tag
# pushes, and via manual workflow_dispatch. Requires all prod secrets —
# see repo Settings → Secrets and Actions for the full inventory.
#
# PR + feature-branch validation runs in `.github/workflows/pr-check.yml`,
# which doesn't require any secrets and gives fast type-check / lint /
# debug-APK feedback for every change — including fork PRs.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: debro-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # Required for `softprops/action-gh-release@v2` below — the default
    # GITHUB_TOKEN issued to workflows is read-only for releases on this org,
    # so without `contents: write` the Create GitHub Release step returns
    # "Resource not accessible by integration · HTTP 403". Granular job-level
    # scope (instead of workflow-level) keeps the rest of the build as
    # read-only as possible. Only the create-release step actually needs
    # write; everything else is unaffected by this scope (assembleRelease /
    # bundleRelease / upload-artifact don't touch the repo contents API).
    permissions:
      contents: write
    name: Build Signed Release Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK (API 35, build-tools 35.0.0)
        uses: android-actions/setup-android@v3
        with:
          api-level: 35
          build-tools-version: 35.0.0

      # Fail fast with a clear, actionable message if any required secret is
      # missing — far better than a 15-minute silent build failure later.
      # GitHub Actions does NOT auto-export secrets as bash env vars; we must
      # map each ${{ secrets.X }} into the step's env explicitly, or the
      # `: "${VAR:?msg}"` guard below triggers on every run and aborts
      # before decode/build steps ever start.
      - name: Validate required secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          PACKAGE_NAME: ${{ secrets.PACKAGE_NAME }}
          VERSION_NAME: ${{ secrets.VERSION_NAME }}
          # Gemini API key wired from repo secret.
          # AiRepository.kt reads both old + new keys for backwards compat.
          GEMINI_API_KEY_2_5_FLASH_LITE: ${{ secrets.GEMINI_API_KEY_2_5_FLASH_LITE }}
          ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
          ADMOB_BANNER_ID: ${{ secrets.ADMOB_BANNER_ID }}
          ADMOB_INTERSTITIAL_ID: ${{ secrets.ADMOB_INTERSTITIAL_ID }}
          ADMOB_REWARDED_ID: ${{ secrets.ADMOB_REWARDED_ID }}
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_API_KEY: ${{ secrets.ONESIGNAL_API_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          ACCOUNT_DELETION_URL: ${{ secrets.ACCOUNT_DELETION_URL }}
        run: |
          set -e
          : "${KEYSTORE_BASE64:?ERROR: KEYSTORE_BASE64 secret missing — add it in repo Settings > Secrets.}"
          : "${GOOGLE_SERVICES_JSON:?ERROR: GOOGLE_SERVICES_JSON secret missing.}"
          : "${KEYSTORE_PASSWORD:?ERROR: KEYSTORE_PASSWORD secret missing.}"
          : "${KEY_PASSWORD:?ERROR: KEY_PASSWORD secret missing.}"
          : "${PACKAGE_NAME:?ERROR: PACKAGE_NAME secret missing.}"
          : "${VERSION_NAME:?ERROR: VERSION_NAME secret missing.}"
          # Gemini API key wired from repo secret.
          : "${GEMINI_API_KEY_2_5_FLASH_LITE:?ERROR: GEMINI_API_KEY_2_5_FLASH_LITE secret missing.}"
          : "${ADMOB_APP_ID:?ERROR: ADMOB_APP_ID secret missing.}"
          : "${ADMOB_BANNER_ID:?ERROR: ADMOB_BANNER_ID secret missing.}"
          : "${ADMOB_INTERSTITIAL_ID:?ERROR: ADMOB_INTERSTITIAL_ID secret missing.}"
          : "${ADMOB_REWARDED_ID:?ERROR: ADMOB_REWARDED_ID secret missing.}"
          : "${ONESIGNAL_APP_ID:?ERROR: ONESIGNAL_APP_ID secret missing.}"
          : "${ONESIGNAL_API_KEY:?ERROR: ONESIGNAL_API_KEY secret missing.}"
          : "${FIREBASE_PROJECT_ID:?ERROR: FIREBASE_PROJECT_ID secret missing.}"
          : "${ACCOUNT_DELETION_URL:?ERROR: ACCOUNT_DELETION_URL secret missing.}"
          echo "All required secrets present."

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/keystore.jks

      - name: Create google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Validate google-services.json
        run: |
          jq empty app/google-services.json || (echo "Invalid google-services.json" && exit 1)
          grep -q '"package_name": "com.dhanuk.debtbro"' app/google-services.json || (echo "Wrong package_name in google-services.json" && exit 1)

      - name: Create local.properties
        run: |
          cat > local.properties << EOF
          sdk.dir=$ANDROID_HOME
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2_5_FLASH_LITE=${{ secrets.GEMINI_API_KEY_2_5_FLASH_LITE }}
          ADMOB_APP_ID=${{ secrets.ADMOB_APP_ID }}
          ADMOB_BANNER_ID=${{ secrets.ADMOB_BANNER_ID }}
          ADMOB_INTERSTITIAL_ID=${{ secrets.ADMOB_INTERSTITIAL_ID }}
          ADMOB_REWARDED_ID=${{ secrets.ADMOB_REWARDED_ID }}
          ONESIGNAL_APP_ID=${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_API_KEY=${{ secrets.ONESIGNAL_API_KEY }}
          PACKAGE_NAME=${{ secrets.PACKAGE_NAME }}
          VERSION_CODE=${{ secrets.VERSION_CODE }}
          VERSION_NAME=${{ secrets.VERSION_NAME }}
          KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
          FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
          ACCOUNT_DELETION_URL=${{ secrets.ACCOUNT_DELETION_URL }}
          EOF

      - name: Echo version info
        run: |
          echo "Build #${{ github.run_number }}"
          echo "SHA: ${{ github.sha }}"
          echo "Ref: ${{ github.ref }}"

      - name: Grant Gradle permission
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Build Release AAB
        run: ./gradlew bundleRelease --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DebtBro-APK-${{ github.run_number }}
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: DebtBro-AAB-${{ github.run_number }}
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "DebtBro v1.0.${{ github.run_number }}"
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
